name: SSHTunnel Pro
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.local.sshtunnelpro
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  SSHTunnel Pro:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - ".git/**"
          - "*.md"
          - "project.yml"
          - "*.xcodeproj"
          - "*.xcworkspace"
          - "DerivedData/**"
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets: []
